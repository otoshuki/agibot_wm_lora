chunk: 16
n_previous: 8 
n_view: 1

model:

  # pretrained_checkpoint: "/workspace/AgiBotWM/EnerV_AC_deepspeed_v0.1.pt"
  pretrained_checkpoint: "/workspace/AgiBotWM/log/agibotworld_v3/checkpoints/epoch=1-step=7000.ckpt"

  auto_padzero_input_block: False
  auto_padrand_input_block: False

  base_learning_rate: 1e-5
  scale_lr: False
  target: lvdm.models.ddpm3d.ACWMLatentDiffusion
  params:
    rescale_betas_zero_snr: True
    parameterization: "v"
    linear_start: 0.00085
    linear_end: 0.012
    num_timesteps_cond: 1
    log_every_t: 20
    timesteps: 1000
    first_stage_key: ["video", "traj"]
    cond_stage_key: delta_action
    cond_stage_trainable: True
    image_proj_model_trainable: False
    traj_prompt_proj_model_trainable: False
    
    #New addition
    # unet_trainable_list:
    #   - "attn2"
    #   - ".2.transformer_blocks.0.attn1"
    unet_trainable_list:
      - "init_attn"
      - "lora_"
    use_lora: True
    lora_rank: 32
    lora_alpha: 32

    # NEW: Min-SNR-gamma loss weighting (Hang et al. 2023). Rebalances timestep
    # gradient mass toward mid-noise steps where motion structure is learned.
    # Read by ACWMLatentDiffusion.p_losses (patched in ddpm3d.py).
    use_min_snr: True
    min_snr_gamma: 8.0
 
    # NEW: motion-weighted loss. Multiplies per-pixel loss by a mask derived
    # from |x_t - x_{t-1}| in latent space, so fast-moving objects get more
    # gradient instead of being drowned by static background.
    use_motion_weighted_loss: True
    motion_weight_strength: 1.5   # max multiplier for a fast pixel (1.0 = off)
 
    # NEW: latent motion consistency loss. Penalizes mismatch between predicted
    # and target temporal differences. Cheap, directly improves motion PSNR.
    motion_consistency_weight: 0.1
 
    # NEW: self-forcing / memory noising. During training, with probability p,
    # add mild noise to memory frames to close the exposure-bias gap between
    # train (clean memory) and inference (generated, imperfect memory).
    # This is the single biggest thing for object permanence & long-horizon consistency.
    use_noisy_memory: True
    noisy_memory_prob: 0.3
    noisy_memory_max_t: 250   # sample t uniformly in [0, 200] for memory frames
    
    #####

    conditioning_key: hybrid
    image_size: [40, 64]
    channels: 4
    scale_by_std: False
    scale_factor: 0.18215
    use_ema: False
    uncond_prob: 0.1
    uncond_type: 'zero_embed'
    rand_cond_frame: true
    use_dynamic_rescale: true
    base_scale: 0.7
    fps_condition_type: 'fps'
    perframe_ae: True
    ae_batch_size: 2
    chunk: ${chunk}
    n_view: ${n_view}

    ### raymap: 3 direction + 3 origin maps
    use_raymap_dir: True
    use_raymap_origin: True
    ### dropout mask: 1
    use_cat_mask: True

    sparse_memory: True
    ddim_num_chunk: 1
    views_name_wo_imgcat: ["left_hand", "right_hand"]

    unet_config:
      target: lvdm.modules.networks.openaimodel3dcausal.UNetModel
      params:
        ### img(4) + mask(1) + cond img(4) + traj(4) + ray(6)
        in_channels: 19
        out_channels: 4
        model_channels: 320
        attention_resolutions:
        - 4
        - 2
        - 1
        num_res_blocks: 2
        channel_mult:
        - 1
        - 2
        - 4
        - 4
        dropout: 0.1
        num_head_channels: 64
        transformer_depth: 1
        context_dim: 1024
        use_linear: true
        use_checkpoint: True
        temporal_conv: True
        temporal_attention: True
        temporal_selfatt_only: true
        temporal_batch_size: -1
        use_causal_attention: false
        temporal_length: 20
        addition_attention: true
        image_cross_attention: true
        traj_cross_attention: true
        default_fs: 30
        fs_condition: true
        resblock_updown: false
        chunk: ${chunk}
        n_view: ${n_view}
        causal_temp_conv: true
        use_block_idx: true
        use_domain_embedding: true
        adapt_to_mvt: True

    first_stage_config:
      target: lvdm.models.autoencoder.AutoencoderKL
      params:
        embed_dim: 4
        monitor: val/rec_loss
        ddconfig:
          double_z: True
          z_channels: 4
          resolution: 256
          in_channels: 3
          out_ch: 3
          ch: 128
          ch_mult:
          - 1
          - 2
          - 4
          - 4
          num_res_blocks: 2
          attn_resolutions: []
          dropout: 0.0
        lossconfig:
          target: torch.nn.Identity

    cond_stage_config:
      target: lvdm.modules.encoders.resampler.Resampler
      params:
        dim: 1024
        depth: 4
        dim_head: 64
        heads: 12
        num_queries: 16
        embedding_dim: 28 #14
        output_dim: 1024
        ff_mult: 4

    img_cond_stage_config:
      target: lvdm.modules.encoders.condition.FrozenOpenCLIPImageEmbedderV2
      params:
        abspath: "/workspace/AgiBotWM/open_clip_pytorch_model.bin"
        freeze: true

    image_proj_stage_config:
      target: lvdm.modules.encoders.resampler.Resampler
      params:
        dim: 1024
        depth: 4
        dim_head: 64
        heads: 12
        num_queries: 16
        embedding_dim: 1280
        output_dim: 1024
        ff_mult: 4
        video_length: 16

data:
  target: dataset.utils_data.DataModuleFromConfig
  params:
    batch_size: 5 #8
    num_workers: 8
    train:
      target: dataset.agibotworld_challenge_dataset.AgiBotWorldICRA26Challenge
      params:
        data_roots: ["/workspace/AgiBotWM/WorldModel/mnt/public/chenshengcong/dataset/iros_challenge_2025_acwm/", ]
        domains: ["agibotworld", ]
        split: "train"
        sample_size: [320, 512]
        sample_n_frames: 64
        preprocess :  'resize'
        valid_cam :  'head'
        chunk: ${chunk}
        n_previous: ${n_previous}
        previous_pick_mode: 'random'
        random_crop: True
        min_sep: 1
        max_sep: 5

lightning:
  precision: bf16
  #strategy: fsdp_native #deepspeed_stage_2 but commented out
  trainer:
    benchmark: True
    accumulate_grad_batches: 1
    max_steps: 100000
    log_every_n_steps: 20
    val_check_interval: 1000
    gradient_clip_algorithm: 'norm'
    gradient_clip_val: 1.0
  callbacks:
    model_checkpoint:
      target: pytorch_lightning.callbacks.ModelCheckpoint
      params:
        every_n_train_steps: 1000
        filename: "{epoch}-{step}"
        save_weights_only: True
    metrics_over_trainsteps_checkpoint:
      target: pytorch_lightning.callbacks.ModelCheckpoint
      params:
        filename: '{epoch}-{step}'
        save_weights_only: True
        every_n_train_steps: 2000
    batch_logger:
      target: callbacks.ImageLogger
      params:
        batch_frequency:  500
        ### save videos
        to_local: True
        cat_all_to_save: True
        save_dir: runtime_vis_results/expv0
        max_images: 6400
        log_images_kwargs:
          ddim_steps: 80
          unconditional_guidance_scale: 5.0
          timestep_spacing: uniform_trailing
          guidance_rescale: 0.5
          save_fps: 15
